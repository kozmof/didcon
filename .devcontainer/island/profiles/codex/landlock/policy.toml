# Landlock policy for the OpenAI Codex CLI.
#
# Allows access to:
#   - System binaries/libs under /usr, /bin, /lib, /sbin  (read + execute)
#   - Safe pseudo-devices                                  (read/write)
#   - System config under /etc and /proc/self              (read only)
#   - /tmp and /workspace                                  (full access)
#   - isolated Codex state plus only ~/.codex/tmp/arg0
#                                                           ~/.codex/tmp/arg0/ for process
#                                                           renaming; does not use TMPDIR)
#
# Denies by omission (Landlock default-deny):
#   - ~/.ssh, ~/.gnupg, ~/.npmrc
#   - /opt/scripts (container firewall scripts)
#   - /var/log (firewall audit logs)
#
# Explicit isolated state is granted read-write access by the
# profile-specific path rule.

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

# System binaries and libraries
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = ["/bin", "/lib", "/sbin", "/usr"]

# Rust toolchain — needed so Codex can spawn the cargo-workspace sandbox
# [[path_beneath]]
# allowed_access = ["abi.read_execute"]
# parent = ["/opt/rust"]

# Safe pseudo-devices (needed by node for crypto and I/O)
[[path_beneath]]
allowed_access = ["read_file", "write_file"]
parent = ["/dev/full", "/dev/null", "/dev/random", "/dev/urandom", "/dev/zero"]

# System configuration (read only)
[[path_beneath]]
allowed_access = ["read_dir", "read_file", "refer"]
parent = ["/etc", "/proc/self", "/proc/cpuinfo"]

# Ephemeral scratch space
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/tmp"]

# Workspace — read-write so Codex can edit files
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/workspace"]

# Codex home — needed for ~/.codex/tmp/arg0/ (process renaming) and config
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/home/dev/.codex/tmp/arg0", "/home/dev/.island/codex"]

[[net_port]]
allowed_access = ["connect_tcp"]
port = [443]

[[net_port]]
allowed_access = ["bind_tcp"]
port = [0]
