# Landlock policy inherited by rustc, build scripts, proc macros, and tests.
abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = ["/bin", "/lib", "/sbin", "/usr", "/opt/rust"]

[[path_beneath]]
allowed_access = ["read_file", "write_file"]
parent = ["/dev/full", "/dev/null", "/dev/random", "/dev/urandom", "/dev/zero"]

[[path_beneath]]
allowed_access = ["read_dir", "read_file", "refer"]
parent = ["/etc"]

[[path_beneath]]
allowed_access = ["read_file"]
parent = ["/proc"]

[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/tmp", "/workspace", "/home/dev/.cargo"]

[[net_port]]
allowed_access = ["connect_tcp"]
port = [443]
