# Profile for herdr, a terminal agent-multiplexer (https://herdr.dev/).
# Applied via the /usr/local/bin/herdr shim (not auto-activated by CWD).
#
# workspace = false redirects the XDG dirs to explicit isolated paths,
# isolating herdr's config/state from the real home directory.  herdr follows
# XDG conventions natively (~/.config/herdr/config.toml, XDG_STATE_HOME for
# session state), so no tool-specific env override is needed.
#
# TMPDIR is deliberately NOT redirected: pane shells inherit this profile's
# env, and tools they run (e.g. safe-chain wrapping npm/pnpm) hand $TMPDIR
# paths to nested island sandboxes, which can only read the shared /tmp.
workspace = false

[[env]]
name = "XDG_CONFIG_HOME"
literal = "/home/dev/.island/herdr/config"

[[env]]
name = "XDG_DATA_HOME"
literal = "/home/dev/.island/herdr/data"

[[env]]
name = "XDG_CACHE_HOME"
literal = "/home/dev/.island/herdr/cache"

[[env]]
name = "XDG_STATE_HOME"
literal = "/home/dev/.island/herdr/state"

[[env]]
name = "XDG_RUNTIME_DIR"
literal = "/home/dev/.island/herdr/runtime"
