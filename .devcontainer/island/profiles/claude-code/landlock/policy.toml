# Landlock policy for the Claude Code CLI.
#
# Allows access to:
#   - System binaries/libs under /usr, /bin, /lib, /sbin  (read + execute)
#   - Safe pseudo-devices incl. /dev/tty and /dev/pts     (read/write)
#   - System config under /etc and /proc/self              (read only)
#   - /tmp and /workspace                                  (full access)
#   - Outbound HTTPS (port 443) for the Anthropic API
#
# Denies by omission (Landlock default-deny):
#   - ~/.ssh, ~/.claude, ~/.gnupg, ~/.npmrc
#   - /opt/scripts (container firewall scripts)
#   - /var/log (firewall audit logs)
#   - All TCP ports except 443
#
# Explicit isolated state is granted read-write access by the
# profile-specific path rule.

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

# System binaries and libraries
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = ["/bin", "/lib", "/sbin", "/usr"]

# Rust toolchain — needed so Claude can spawn the cargo-workspace sandbox
# [[path_beneath]]
# allowed_access = ["abi.read_execute"]
# parent = ["/opt/rust"]

# Safe pseudo-devices (needed by node for crypto and I/O)
[[path_beneath]]
allowed_access = ["read_file", "write_file"]
parent = ["/dev/full", "/dev/null", "/dev/random", "/dev/urandom", "/dev/zero"]

# Terminal devices (needed by Claude Code's TUI)
[[path_beneath]]
allowed_access = ["read_file", "write_file"]
parent = ["/dev/tty", "/dev/pts"]

# System configuration (read only)
[[path_beneath]]
allowed_access = ["read_dir", "read_file", "refer"]
parent = ["/etc", "/proc/self", "/proc/cpuinfo"]

# Ephemeral scratch space
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/tmp"]

# Workspace — read-write so Claude can edit files
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/workspace"]

# Isolated agent state and credentials
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/home/dev/.island/claude"]

# Outbound HTTPS for the Anthropic API (api.anthropic.com, statsig.anthropic.com)
# The external iptables firewall enforces the domain allowlist; Landlock only
# needs to permit the port so node's connect() is not blocked before iptables.
[[net_port]]
allowed_access = ["connect_tcp"]
port = [443]

[[net_port]]
allowed_access = ["bind_tcp"]
port = [0]
