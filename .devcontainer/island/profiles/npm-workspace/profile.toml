# Profile for npm invocations inside /workspace.
# Applied via the /usr/local/bin/npm shim.
#
# workspace = false preserves the real XDG dirs so npm can reach ~/.config/npm.
# NPM cache is redirected to /workspace/.npm-cache to avoid needing ~/.npm access.

workspace = false

[[context]]
when_beneath = "/workspace"

[[env]]
name = "NPM_CONFIG_CACHE"
literal = "/workspace/.npm-cache"

[[env]]
name = "XDG_CONFIG_HOME"
literal = "/home/dev/.config"
