# Landlock policy for npm and its child processes (postinstall hooks, etc.).
#
# Child processes (npm lifecycle scripts) inherit Landlock restrictions,
# which is the primary protection against malicious postinstall hooks.
#
# Allows access to:
#   - System binaries/libs                    (read + execute)
#   - Safe pseudo-devices                     (read/write)
#   - /etc                                    (read + list)
#   - /proc                                   (read files only, no dir listing)
#   - /tmp                                    (full — includes ssh-agent socket)
#   - /workspace                              (full — project files + npm cache)
#   - ~/.npmrc and ~/.config/npm (credentials)
#   - ~/.config/npm                           (read — XDG npm config)
#
# Denies by omission:
#   - ~/.ssh, ~/.claude, ~/.gnupg
#   - /opt/scripts, /var/log

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
scoped = ["abi.all"]

# System binaries and libraries
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = ["/bin", "/lib", "/sbin", "/usr"]

# Safe pseudo-devices
[[path_beneath]]
allowed_access = ["read_file", "write_file"]
parent = ["/dev/full", "/dev/null", "/dev/random", "/dev/urandom", "/dev/zero"]

# System configuration (read only)
[[path_beneath]]
allowed_access = ["read_dir", "read_file", "refer"]
parent = ["/etc"]

# /proc: read_file only (not read_dir) so Node.js child processes can open
# /proc/self/stat etc. for memory usage, but postinstall hooks cannot list
# /proc/ to enumerate running PIDs.
# Note: /proc/self cannot be used here — Landlock resolves symlinks to the
# island PID's inode at setup time, which doesn't cover child process inodes.
[[path_beneath]]
allowed_access = ["read_file"]
parent = ["/proc"]

# Ephemeral scratch space (also contains SSH_AUTH_SOCK if ssh-agent is running)
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/tmp"]

# Workspace — project source and npm cache (NPM_CONFIG_CACHE=/workspace/.npm-cache)
[[path_beneath]]
allowed_access = ["abi.all"]
parent = ["/workspace"]

